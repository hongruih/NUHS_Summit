<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Acceptance Survey</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: #fff;
    }
    .container {
      text-align: center;
      max-width: 380px;
      width: 100%;
    }
    .icon { font-size: 3rem; margin-bottom: 16px; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #e879f9; margin-bottom: 12px; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 28px; }
    .back {
      display: inline-block;
      padding: 12px 28px;
      background: #a855f7;
      border-radius: 10px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .back:hover { background: #9333ea; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📋</div>
    <h1>AI Acceptance Survey</h1>
    <p>This survey is being set up. Please check back shortly, or approach the booth for assistance.</p>
    <a class="back" href="/">← Back to Surveys</a>
  </div>
</body>
</html>
