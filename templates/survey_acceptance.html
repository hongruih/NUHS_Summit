<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Acceptance Survey</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f1f3f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 24px 16px 40px;
      color: #202124;
    }

    .survey-wrap {
      width: 100%;
      max-width: 520px;
    }

    /* ── Header ── */
    .survey-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .survey-header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(90deg, #c026d3, #9333ea);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .survey-header p {
      color: #5f6368;
      font-size: 0.85rem;
    }

    /* ── Progress dots ── */
    .progress {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #dadce0;
      transition: background 0.3s ease, transform 0.2s ease;
    }
    .dot.active { background: #c026d3; transform: scale(1.3); }
    .dot.done   { background: #9333ea; }

    /* ── Card ── */
    .card {
      background: #ffffff;
      border: 1px solid #dadce0;
      border-radius: 20px;
      padding: 24px 20px;
    }

    /* ── Shared labels ── */
    .step-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #a855f7;
      margin-bottom: 10px;
    }

    /* ────────────────────────────────
       PART A — option buttons
    ──────────────────────────────── */
    .question-text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.5;
      color: #202124;
      margin-bottom: 18px;
    }
    .multi-hint {
      font-size: 0.75rem;
      color: #5f6368;
      margin-bottom: 10px;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 9px;
      margin-bottom: 18px;
    }
    .opt-btn {
      width: 100%;
      padding: 12px 16px;
      background: #ffffff;
      border: 1.5px solid #dadce0;
      border-radius: 12px;
      color: #202124;
      font-family: inherit;
      font-size: 0.95rem;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .opt-btn:hover {
      background: rgba(168,85,247,0.06);
      border-color: rgba(168,85,247,0.4);
      color: #202124;
    }
    .opt-btn.selected {
      background: rgba(168,85,247,0.1);
      border-color: #a855f7;
      color: #6b21a8;
      font-weight: 600;
    }

    /* ────────────────────────────────
       PART B-F — Likert scale
    ──────────────────────────────── */
    .part-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #202124;
      margin-bottom: 6px;
      line-height: 1.4;
    }
    .part-section-sub {
      font-size: 0.8rem;
      color: #5f6368;
      margin-bottom: 18px;
    }

    /* Scale header row */
    .scale-header {
      display: grid;
      grid-template-columns: 1fr repeat(5, 36px);
      gap: 4px;
      align-items: center;
      padding: 0 0 6px 0;
      margin-bottom: 2px;
      border-bottom: 1px solid #dadce0;
    }
    .scale-header-blank { /* left spacer */ }
    .scale-header-num {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      color: #a855f7;
    }
    .scale-ends-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: #80868b;
      margin-bottom: 10px;
      padding: 0 2px;
    }

    /* Each question row */
    .likert-item {
      display: grid;
      grid-template-columns: 1fr repeat(5, 36px);
      gap: 4px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f1f3f4;
    }
    .likert-item:last-child { border-bottom: none; }

    .likert-q-text {
      font-size: 0.82rem;
      color: #202124;
      line-height: 1.45;
      padding-right: 8px;
    }

    .likert-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid #dadce0;
      background: #ffffff;
      color: #80868b;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      padding: 0;
    }
    .likert-btn:hover {
      background: rgba(168,85,247,0.08);
      border-color: rgba(168,85,247,0.5);
      color: #6b21a8;
    }
    .likert-btn.selected {
      background: #a855f7;
      border-color: #a855f7;
      color: #fff;
    }

    /* ── Shared nav ── */
    .error-msg {
      color: #f87171;
      font-size: 0.82rem;
      margin-bottom: 10px;
      min-height: 1.2em;
    }
    .nav-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .btn-back-step {
      flex: 0 0 auto;
      padding: 13px 18px;
      background: #f1f3f4;
      border: 1.5px solid #dadce0;
      border-radius: 12px;
      color: #5f6368;
      font-family: inherit;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-back-step:hover { background: #e8eaed; color: #202124; }
    .btn-back-step:disabled { opacity: 0.2; cursor: not-allowed; }

    .btn-next {
      flex: 1;
      padding: 13px;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-next:hover { opacity: 0.9; }
    .btn-next:active { transform: scale(0.98); }
    .btn-next:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Done screen ── */
    #done-screen {
      display: none;
      text-align: center;
      padding-top: 40px;
    }
    .done-icon { font-size: 3.5rem; margin-bottom: 20px; }
    #done-screen h2 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #9333ea;
      margin-bottom: 10px;
    }
    #done-screen p {
      color: #5f6368;
      line-height: 1.6;
      margin-bottom: 28px;
    }
    .btn-back-home {
      display: inline-block;
      padding: 12px 28px;
      background: rgba(168,85,247,0.08);
      border: 1px solid rgba(168,85,247,0.4);
      border-radius: 10px;
      color: #7e22ce;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
    }

    /* ── Mobile: reflow Likert grid ── */
    @media (max-width: 500px) {
      body { padding: 16px 12px 32px; }
      .card { padding: 18px 14px; }
      /* Hide column-number header; the SD→SA label row gives enough context */
      .scale-header { display: none; }
      /* Reflow: text on row 1 spanning all 5 cols; buttons fill row 2 */
      .likert-item {
        grid-template-columns: repeat(5, 1fr);
        row-gap: 10px;
        padding: 14px 0;
      }
      .likert-q-text {
        grid-column: 1 / -1;
        padding-right: 0;
        font-size: 0.85rem;
      }
      /* Larger tap targets */
      .likert-btn { width: 100%; height: 44px; border-radius: 10px; font-size: 0.85rem; }
      .opt-btn { padding: 14px 16px; font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<div class="survey-wrap">

  <div style="text-align:center;margin-bottom:16px">
    <img src="/static/HCRD.png" alt="HCRD" style="height:50px;width:auto">
  </div>
  <div class="survey-header">
    <h1>AI Acceptance Survey</h1>
    <p>NUH AI Summit 2026 &middot; Your responses are anonymous</p>
  </div>

  <div class="progress" id="progress"></div>

  <!-- ── Step card ── -->
  <div id="question-screen">
    <div class="card" id="step-card">
      <!-- filled by JS -->
    </div>
    <div class="error-msg" id="error-msg"></div>
    <div class="nav-row">
      <button class="btn-back-step" id="back-btn" onclick="goBack()" disabled>&#8592;</button>
      <button class="btn-next" id="next-btn" onclick="goNext()">Next</button>
    </div>
  </div>

  <!-- ── Done screen ── -->
  <div id="done-screen">
    <div class="done-icon">&#10003;</div>
    <h2>Thank you!</h2>
    <p>Your responses have been recorded.<br>We appreciate your participation.</p>
    <a class="btn-back-home" href="/">&#8592; Back to Surveys</a>
    <p style="margin-top:24px;font-size:.72rem;color:#80868b">NUH AI Summit &middot; 2026</p>
  </div>

</div><!-- /survey-wrap -->

<script>
  // ── Data from server ──────────────────────────────────
  const PART_A_STEPS = [
    { key: "age_group",        label: "How old are you?",                                              multi: false, options: {{ part_a.age_group        | tojson }} },
    { key: "gender",           label: "What is your gender?",                                          multi: false, options: {{ part_a.gender           | tojson }} },
    { key: "disciplines",      label: "Which discipline(s) best describe your role?",                  multi: true,  options: {{ part_a.disciplines      | tojson }} },
    { key: "years_healthcare", label: "How many years have you worked in healthcare?",                  multi: false, options: {{ part_a.years_healthcare | tojson }} },
    { key: "years_role",       label: "How many years have you been in your current role?",             multi: false, options: {{ part_a.years_role       | tojson }} },
    { key: "seniority",        label: "Which best describes your seniority level?",                    multi: false, options: {{ part_a.seniority        | tojson }} },
    { key: "ai_frequency",     label: "How often do you use AI tools in your work?",                   multi: false, options: {{ part_a.ai_frequency     | tojson }} },
    { key: "ai_tools",         label: "Which AI tools have you used? (Select all that apply)",         multi: true,  options: {{ part_a.ai_tools         | tojson }} }
  ];

  // Build Likert steps from server data: array of {part, title, questions:[{key,text}]}
  const LIKERT_PARTS = [
    {% for part_key, part_val in likert.items() %}
    {
      part: {{ part_key | tojson }},
      title: {{ part_val.title | tojson }},
      questions: [
        {% for q_key, q_text in part_val.questions.items() %}
        { key: {{ q_key | tojson }}, text: {{ q_text | tojson }} }{% if not loop.last %},{% endif %}
        {% endfor %}
      ]
    }{% if not loop.last %},{% endif %}
    {% endfor %}
  ];

  const TOTAL_STEPS = PART_A_STEPS.length + LIKERT_PARTS.length; // 13
  let step = 0;

  // Answers storage
  const partAAnswers = {};    // key -> string or [string]
  const likertAnswers = {};   // key -> 1-5  (e.g. "B1" -> 3)

  // ── Progress dots ──────────────────────────────────────
  function buildDots() {
    const c = document.getElementById('progress');
    c.innerHTML = '';
    for (let i = 0; i < TOTAL_STEPS; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.id = 'dot-' + i;
      c.appendChild(d);
    }
  }

  function updateDots(current) {
    for (let i = 0; i < TOTAL_STEPS; i++) {
      const d = document.getElementById('dot-' + i);
      d.className = 'dot' + (i < current ? ' done' : i === current ? ' active' : '');
    }
  }

  // ── Render dispatch ────────────────────────────────────
  function renderStep(i) {
    document.getElementById('error-msg').textContent = '';
    document.getElementById('back-btn').disabled = (i === 0);
    document.getElementById('next-btn').textContent = (i === TOTAL_STEPS - 1) ? 'Submit' : 'Next';
    updateDots(i);
    window.scrollTo(0, 0);

    if (i < PART_A_STEPS.length) {
      renderPartA(i);
    } else {
      renderLikert(i - PART_A_STEPS.length);
    }
  }

  // ── Part A rendering ───────────────────────────────────
  function renderPartA(i) {
    const s = PART_A_STEPS[i];
    const saved = partAAnswers[s.key];

    let html = `
      <div class="step-label">Part A &mdash; About You &nbsp;&middot;&nbsp; Question ${i + 1} of ${PART_A_STEPS.length}</div>
      <div class="question-text">${escHtml(s.label)}</div>
      ${s.multi ? '<div class="multi-hint">Select all that apply.</div>' : ''}
      <div class="options" id="options-container"></div>
    `;
    document.getElementById('step-card').innerHTML = html;

    const container = document.getElementById('options-container');
    s.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      const isSel = s.multi
        ? (Array.isArray(saved) && saved.includes(opt))
        : (saved === opt);
      if (isSel) btn.classList.add('selected');
      btn.onclick = () => selectPartA(s.key, opt, s.multi, btn);
      container.appendChild(btn);
    });
  }

  function selectPartA(key, value, multi, btn) {
    if (multi) {
      const cur = Array.isArray(partAAnswers[key]) ? partAAnswers[key] : [];
      const idx = cur.indexOf(value);
      if (idx === -1) {
        partAAnswers[key] = [...cur, value];
        btn.classList.add('selected');
      } else {
        partAAnswers[key] = cur.filter(v => v !== value);
        btn.classList.remove('selected');
      }
    } else {
      partAAnswers[key] = value;
      document.querySelectorAll('#options-container .opt-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    }
  }

  // ── Likert rendering ───────────────────────────────────
  function renderLikert(li) {
    const part = LIKERT_PARTS[li];
    const globalStep = PART_A_STEPS.length + li;

    let html = `
      <div class="step-label">Part ${part.part} &mdash; ${PART_A_STEPS.length + li + 1} of ${TOTAL_STEPS}</div>
      <div class="part-section-title">${escHtml(part.title)}</div>
      <div class="part-section-sub">Rate each statement: 1 = Strongly Disagree &rarr; 5 = Strongly Agree</div>

      <div class="scale-header">
        <div class="scale-header-blank"></div>
        <div class="scale-header-num">1</div>
        <div class="scale-header-num">2</div>
        <div class="scale-header-num">3</div>
        <div class="scale-header-num">4</div>
        <div class="scale-header-num">5</div>
      </div>
      <div class="scale-ends-row">
        <span>Strongly Disagree</span>
        <span>Strongly Agree</span>
      </div>
    `;

    part.questions.forEach(q => {
      const saved = likertAnswers[q.key] || null;
      const btns = [1,2,3,4,5].map(n =>
        `<button class="likert-btn${saved === n ? ' selected' : ''}"
                 onclick="selectLikert('${q.key}', ${n}, this)">${n}</button>`
      ).join('');
      html += `
        <div class="likert-item" id="likert-row-${q.key}">
          <div class="likert-q-text">${escHtml(q.text)}</div>
          ${btns}
        </div>
      `;
    });

    document.getElementById('step-card').innerHTML = html;
  }

  function selectLikert(key, value, btn) {
    likertAnswers[key] = value;
    // Deselect siblings in same row
    const row = document.getElementById('likert-row-' + key);
    row.querySelectorAll('.likert-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  // ── Validation ─────────────────────────────────────────
  function validateStep(i) {
    if (i < PART_A_STEPS.length) {
      const s = PART_A_STEPS[i];
      const val = partAAnswers[s.key];
      return s.multi ? (Array.isArray(val) && val.length > 0) : !!val;
    } else {
      const part = LIKERT_PARTS[i - PART_A_STEPS.length];
      return part.questions.every(q => likertAnswers[q.key] != null);
    }
  }

  // ── Navigation ─────────────────────────────────────────
  function goBack() {
    if (step > 0) { step--; renderStep(step); }
  }

  function goNext() {
    if (!validateStep(step)) {
      if (step < PART_A_STEPS.length) {
        document.getElementById('error-msg').textContent = 'Please make a selection before continuing.';
      } else {
        document.getElementById('error-msg').textContent = 'Please rate all statements before continuing.';
      }
      return;
    }
    document.getElementById('error-msg').textContent = '';

    if (step < TOTAL_STEPS - 1) {
      step++;
      renderStep(step);
    } else {
      submitSurvey();
    }
  }

  // ── Submit ─────────────────────────────────────────────
  async function submitSurvey() {
    const btn = document.getElementById('next-btn');
    btn.disabled = true;
    btn.textContent = 'Saving\u2026';

    const payload = {
      part_a: {
        age_group:        partAAnswers.age_group        || null,
        gender:           partAAnswers.gender           || null,
        disciplines:      partAAnswers.disciplines      || [],
        years_healthcare: partAAnswers.years_healthcare || null,
        years_role:       partAAnswers.years_role       || null,
        seniority:        partAAnswers.seniority        || null,
        ai_frequency:     partAAnswers.ai_frequency     || null,
        ai_tools:         partAAnswers.ai_tools         || []
      },
      likert_answers: likertAnswers
    };

    try {
      const resp = await fetch('/api/acceptance/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!resp.ok) throw new Error('Server error');
      document.getElementById('question-screen').style.display = 'none';
      document.getElementById('done-screen').style.display = 'block';
      updateDots(TOTAL_STEPS);
      window.scrollTo(0, 0);
    } catch (e) {
      document.getElementById('error-msg').textContent = 'Something went wrong. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Submit';
    }
  }

  // ── Utility ────────────────────────────────────────────
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ───────────────────────────────────────────────
  buildDots();
  renderStep(0);
</script>

</body>
</html>
